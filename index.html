<!-- PRODUCT ADS BAR -->
<div id="productAds" class="product-ads">
  <img src="https://via.placeholder.com/60" alt="Produk" class="ads-img">
  
  <div class="ads-content">
    <strong>🔥 Promo Spesial!</strong>
    <p>Dapatkan Diskon 50% untuk produk terbaru kami!</p>
  </div>
  
  <a href="#" class="ads-btn">Beli Sekarang</a>
  <span class="close-btn" onclick="closeAds()">✕</span>
</div>

<style>
.product-ads {
  position: fixed;
  bottom: -200px;
  left: 0;
  width: 100%;
  background: #111;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 15px;
  padding: 15px;
  font-family: Arial, sans-serif;
  transition: bottom 0.5s ease;
  z-index: 9999;
}

.ads-img {
  width: 60px;
  height: 60px;
  border-radius: 8px;
}

.ads-content {
  max-width: 300px;
}

.ads-content p {
  margin: 5px 0 0;
  font-size: 14px;
}

.ads-btn {
  background: #ff4d4d;
  color: white;
  padding: 8px 15px;
  text-decoration: none;
  border-radius: 5px;
  font-weight: bold;
}

.close-btn {
  cursor: pointer;
  font-size: 18px;
  margin-left: 10px;
}

/* Responsive */
@media (max-width: 600px) {
  .product-ads {
    flex-direction: column;
    text-align: center;
  }
}
</style>

<script>
// Muncul setelah 3 detik
setTimeout(function() {
  document.getElementById("productAds").style.bottom = "0";
}, 3000);

// Hilang otomatis setelah 12 detik
setTimeout(function() {
  closeAds();
}, 15000);

function closeAds() {
  document.getElementById("productAds").style.bottom = "-200px";
}
</script>
