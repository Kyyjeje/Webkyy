<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Selamat Ulang Tahun 🎉</title>
    <style>
        body {
            margin: 0;
            padding: 0;

            /* GANTI FOTO DI SINI */
            background: url('background.jpg') no-repeat center center fixed;
            background-size: cover;

            font-family: Arial, sans-serif;
            text-align: center;
            color: white;
        }

        .card {
            margin-top: 100px;
            background: rgba(0,0,0,0.6);
            padding: 40px;
            border-radius: 20px;
            display: inline-block;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            animation: fadeIn 3s ease-in-out;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 20px;
        }

        p {
            font-size: 20px;
        }

        .music-btn {
            margin-top: 25px;
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            background-color: #ff4081;
            color: white;
            transition: 0.3s;
        }

        .music-btn:hover {
            background-color: #e73370;
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(-30px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>
<body>

    <!-- Audio -->
    <audio id="bgMusic" loop>
        <source src="musik.mp3" type="audio/mpeg">
        Browser kamu tidak mendukung audio.
    </audio>

    <div class="card">
        <h1>🎉 Selamat Ulang Tahun 🎂</h1>
        <p>Semoga panjang umur, sehat selalu,</p>
        <p>dan semua impianmu tercapai 💖</p>
        <p>Terima kasih sudah menjadi orang yang spesial ✨</p>

        <!-- Tombol Musik -->
        <button class="music-btn" onclick="toggleMusic()" id="musicBtn">
            ▶️ Putar Musik
        </button>
    </div>
<!-- copyright -->
    <footer>
    © <span id="year"></span> Risky Dwi Nugroho. All Rights Reserved.
</footer>

<script>
    document.getElementById("year").textContent = new Date().getFullYear();
</script>
    
    <script>
        const music = document.getElementById("bgMusic");
        const btn = document.getElementById("musicBtn");
        let isPlaying = false;

        function toggleMusic() {
            if (!isPlaying) {
                music.play();
                btn.innerHTML = "⏸️ Pause Musik";
            } else {
                music.pause();
                btn.innerHTML = "▶️ Putar Musik";
            }
            isPlaying = !isPlaying;
        }
    </script>

</body>
</html>
